<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>測試網站</title>
  <meta name="description" content="OpenClaw 自動建立的測試網站" />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --card: rgba(255,255,255,0.08);
      --text: #f5f7fb;
      --muted: #b7c0d8;
      --accent: #7dd3fc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e3a8a, var(--bg));
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.1;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }
    .badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(125, 211, 252, 0.16);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.04em;
      font-size: 14px;
    }
    .footer {
      margin-top: 24px;
      font-size: 14px;
      color: var(--muted);
      opacity: 0.9;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">TEST PAGE</div>
    <h1>測試網站上線啦</h1>
    <p>
      這是一個由 OpenClaw 幫你建立並推送到 GitHub 的測試網頁。
    </p>
    <p>
      如果你看得到這一頁，代表本機檔案 → Git commit → GitHub push → GitHub Pages 發佈，整條流程都跑通了。
    </p>
    <div class="footer">
      Repo: <strong>jcchenzr/repo1</strong><br />
      Generated from local repository at <code>C:\Users\georg\.openclaw\workspace\gitrepo</code>
    </div>
  </main>
</body>
</html>
